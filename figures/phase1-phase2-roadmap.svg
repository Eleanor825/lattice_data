<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">Lattice System Architecture</title>
  <desc id="desc">A structured overview of the Lattice platform from scientific data sources through Phase 1 data foundation, platform runtime, Phase 2 training, and final deliverables.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 42px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 28px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .card-title { font: 700 24px 'Inter', 'Segoe UI', Arial, sans-serif; }
      .body { font: 550 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .chip { font: 700 22px 'Inter', 'Segoe UI', Arial, sans-serif; }
      .small { font: 600 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.5; filter: url(#shadow); }
      .source-bg { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
      .phase1-bg { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; }
      .runtime-bg { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.5; }
      .phase2-bg { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; }
      .outcome-bg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .source-text { fill: #9a3412; }
      .phase1-text { fill: #1d4ed8; }
      .runtime-text { fill: #6d28d9; }
      .phase2-text { fill: #047857; }
      .outcome-text { fill: #0f172a; }
      .arrow { stroke: #475569; stroke-width: 3.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .inline-arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1400" height="1120" fill="url(#bg)"/>

  <text x="70" y="78" class="title">Lattice System Architecture</text>
  <text x="70" y="112" class="subtitle">From fragmented scientific sources to reproducible large-model training</text>

  <rect x="70" y="150" width="1260" height="150" rx="28" class="panel"/>
  <text x="98" y="188" class="section-title">1. Data Sources</text>

  <rect x="102" y="214" width="382" height="58" rx="18" class="source-bg"/>
  <text x="293" y="249" text-anchor="middle" class="chip source-text">Papers and metadata</text>

  <rect x="509" y="214" width="382" height="58" rx="18" class="source-bg"/>
  <text x="700" y="249" text-anchor="middle" class="chip source-text">Materials databases</text>

  <rect x="916" y="214" width="382" height="58" rx="18" class="source-bg"/>
  <text x="1107" y="249" text-anchor="middle" class="chip source-text">Chemistry and knowledge</text>

  <line x1="700" y1="300" x2="700" y2="344" class="arrow"/>

  <rect x="70" y="344" width="1260" height="210" rx="28" class="panel"/>
  <text x="98" y="382" class="section-title">2. Phase 1 · Data Foundation</text>

  <rect x="102" y="416" width="276" height="104" rx="22" class="phase1-bg"/>
  <text x="240" y="448" text-anchor="middle" class="card-title phase1-text">Registry and connectors</text>
  <text x="240" y="476" text-anchor="middle" class="body">source catalog</text>
  <text x="240" y="498" text-anchor="middle" class="body">fetch adapters</text>

  <rect x="405" y="416" width="276" height="104" rx="22" class="phase1-bg"/>
  <text x="543" y="448" text-anchor="middle" class="card-title phase1-text">Normalize schema</text>
  <text x="543" y="476" text-anchor="middle" class="body">Document</text>
  <text x="543" y="498" text-anchor="middle" class="body">Structured + knowledge records</text>

  <rect x="708" y="416" width="276" height="104" rx="22" class="phase1-bg"/>
  <text x="846" y="448" text-anchor="middle" class="card-title phase1-text">Quality and lineage</text>
  <text x="846" y="476" text-anchor="middle" class="body">provenance · license</text>
  <text x="846" y="498" text-anchor="middle" class="body">dedup · filtering</text>

  <rect x="1011" y="416" width="287" height="104" rx="22" class="phase1-bg"/>
  <text x="1154" y="448" text-anchor="middle" class="card-title phase1-text">Compile and release</text>
  <text x="1154" y="476" text-anchor="middle" class="body">pretrain · QA</text>
  <text x="1154" y="498" text-anchor="middle" class="body">manifests + workflow specs</text>

  <line x1="378" y1="468" x2="405" y2="468" class="inline-arrow"/>
  <line x1="681" y1="468" x2="708" y2="468" class="inline-arrow"/>
  <line x1="984" y1="468" x2="1011" y2="468" class="inline-arrow"/>

  <line x1="700" y1="554" x2="700" y2="598" class="arrow"/>

  <rect x="70" y="598" width="1260" height="170" rx="28" class="panel"/>
  <text x="98" y="636" class="section-title">3. Platform Runtime</text>

  <rect x="102" y="668" width="350" height="70" rx="20" class="runtime-bg"/>
  <text x="277" y="699" text-anchor="middle" class="card-title runtime-text">Registry API</text>
  <text x="277" y="723" text-anchor="middle" class="small">runs · datasets · backends</text>

  <rect x="525" y="668" width="350" height="70" rx="20" class="runtime-bg"/>
  <text x="700" y="699" text-anchor="middle" class="card-title runtime-text">Workflow replay</text>
  <text x="700" y="723" text-anchor="middle" class="small">save spec · rerun · migrate</text>

  <rect x="948" y="668" width="350" height="70" rx="20" class="runtime-bg"/>
  <text x="1123" y="699" text-anchor="middle" class="card-title runtime-text">Portable execution</text>
  <text x="1123" y="723" text-anchor="middle" class="small">pandas · Spark · Flink</text>

  <line x1="700" y1="768" x2="700" y2="812" class="arrow"/>

  <rect x="70" y="812" width="1260" height="190" rx="28" class="panel"/>
  <text x="98" y="850" class="section-title">4. Phase 2 · Training and Optimization</text>

  <rect x="102" y="886" width="516" height="84" rx="22" class="phase2-bg"/>
  <text x="360" y="920" text-anchor="middle" class="card-title phase2-text">Training workflows</text>
  <text x="360" y="947" text-anchor="middle" class="body">pretrain · continue · finetune · post-train</text>

  <rect x="652" y="886" width="294" height="84" rx="22" class="phase2-bg"/>
  <text x="799" y="920" text-anchor="middle" class="card-title phase2-text">Model backends</text>
  <text x="799" y="947" text-anchor="middle" class="body">local · HF open · external closed</text>

  <rect x="980" y="886" width="318" height="84" rx="22" class="phase2-bg"/>
  <text x="1139" y="920" text-anchor="middle" class="card-title phase2-text">Run outputs</text>
  <text x="1139" y="947" text-anchor="middle" class="body">checkpoints · metrics · manifests</text>

  <line x1="700" y1="1002" x2="700" y2="1040" class="arrow"/>

  <rect x="70" y="1040" width="1260" height="60" rx="24" class="panel"/>
  <text x="123" y="1078" class="card-title outcome-text">Deliverables</text>

  <rect x="302" y="1053" width="236" height="34" rx="17" class="outcome-bg"/>
  <text x="420" y="1076" text-anchor="middle" class="chip outcome-text">Reusable data assets</text>

  <rect x="582" y="1053" width="214" height="34" rx="17" class="outcome-bg"/>
  <text x="689" y="1076" text-anchor="middle" class="chip outcome-text">Improved models</text>

  <rect x="840" y="1053" width="270" height="34" rx="17" class="outcome-bg"/>
  <text x="975" y="1076" text-anchor="middle" class="chip outcome-text">Traceable reproduction</text>
</svg>
